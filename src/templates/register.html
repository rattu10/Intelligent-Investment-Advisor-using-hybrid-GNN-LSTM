<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Intelligent Investment Advisor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            padding: 20px 0;
            font-family: 'Inter', sans-serif;
        }
        
        .register-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-top: 4px solid #4f46e5;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
        }
        
        .btn-custom {
            background: #4f46e5;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .btn-custom:hover {
            background: #4338ca;
            color: white;
        }
        
        .btn-outline-primary {
            border-color: #cbd5e1;
            color: #475569;
            border-radius: 8px;
            padding: 10px 20px;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        .btn-outline-primary:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            color: #0f172a;
        }
        
        .form-control {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            color: #0f172a;
            border-radius: 8px;
            padding: 12px 20px;
            transition: all 0.2s ease;
        }
        
        .form-control:focus {
            background-color: #ffffff;
            border-color: #4f46e5;
            color: #0f172a;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
        }
        
        .brand-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #4f46e5;
        }
        
        .text-muted {
            color: #64748b !important;
        }
        
        .form-text {
            color: #64748b;
        }
        
        .form-label {
            color: #334155;
            font-weight: 500;
        }
        
        a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            color: #3730a3;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="register-card">
                    <div class="text-center mb-4">
                        <div class="brand-logo">
                            <i class="fas fa-chart-line me-2"></i>Intelligent Investment Advisor
                        </div>
                        <h2 class="mt-3 mb-2">Join Smart Investors!</h2>
                        <p class="text-muted">Create your account and start making smart investment decisions</p>
                    </div>
                    
                    <form id="registerForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="full_name" class="form-label">
                                    <i class="fas fa-user me-2"></i>Full Name
                                </label>
                                <input type="text" class="form-control" id="full_name" name="full_name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">
                                    <i class="fas fa-at me-2"></i>Username
                                </label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                <i class="fas fa-envelope me-2"></i>Email Address
                            </label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock me-2"></i>Password
                            </label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6">
                            <div class="form-text">Password must be at least 6 characters long</div>
                        </div>
                        
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-custom w-100 mb-3">
                            <i class="fas fa-user-plus me-2"></i>Create Account
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <p class="text-muted mb-3">Already have an account?</p>
                        <a href="/login" class="btn btn-outline-primary">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </a>
                    </div>
                    
                    <div class="text-center mt-4">
                        <a href="/" class="text-muted text-decoration-none">
                            <i class="fas fa-arrow-left me-2"></i>Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // Remove checkbox from data
            delete data.terms;
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Registration successful! Please complete your profile.');
                    window.location.href = '/profile-setup';
                } else {
                    alert(result.message || 'Registration failed');
                }
            } catch (error) {
                alert('Registration failed. Please try again.');
            }
        });
    </script>
</body>
</html>
