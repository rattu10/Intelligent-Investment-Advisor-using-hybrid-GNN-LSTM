<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - Intelligent Investment Advisor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        
        .main-container {
            background: #f8fafc;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin: 20px 0;
            min-height: calc(100vh - 40px);
            border: 1px solid #e2e8f0;
        }
        
        .sidebar {
            background: #ffffff;
            border-radius: 20px 0 0 20px;
            border-right: 1px solid #e2e8f0;
            color: #0f172a;
            min-height: calc(100vh - 40px);
        }

        .sidebar h4 {
            color: #0f172a;
        }
        
        .sidebar .nav-link {
            color: #475569;
            padding: 15px 20px;
            border-radius: 8px;
            margin: 5px 10px;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #f1f5f9;
            color: #4f46e5;
        }
        
        .content-area {
            padding: 30px;
            background: #f8fafc;
            border-radius: 0 20px 20px 0;
        }
        
        .recommendation-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, border-color 0.2s ease;
            color: #0f172a;
        }
        
        .recommendation-card:hover {
            transform: translateY(-2px);
            border-color: #cbd5e1;
        }
        
        .stock-symbol {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #4f46e5;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .price-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        
        .potential-gain {
            background: #d1fae5;
            color: #065f46;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .risk-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .risk-low { background: #d1fae5; color: #065f46; }
        .risk-medium { background: #fef3c7; color: #78350f; }
        .risk-high { background: #fee2e2; color: #7f1d1d; }
        
        .btn-custom {
            background: #4f46e5;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .btn-custom:hover {
            background: #4338ca;
            color: white;
        }

        .btn-outline-primary {
            border-color: #cbd5e1;
            color: #475569;
            border-radius: 8px;
            padding: 10px 20px;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        .btn-outline-primary:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            color: #0f172a;
        }
        
        .btn-success {
            background-color: #059669;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .btn-success:hover {
            background-color: #047857;
            color: white;
        }

        .alert-info {
            background-color: #e0e7ff;
            border-color: #c7d2fe;
            color: #3730a3;
            border-radius: 8px;
        }

        .text-muted {
            color: #64748b !important;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="main-container">
                    <div class="row g-0">
                        <!-- Sidebar -->
                        <div class="col-md-3">
                            <div class="sidebar p-3">
                                <div class="text-center mb-4">
                                    <h4><i class="fas fa-chart-line me-2"></i>Intelligent Advisor</h4>
                                </div>
                                
                                <nav class="nav flex-column">
                                    <a class="nav-link" href="/dashboard">
                                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                                    </a>
                                    <a class="nav-link" href="/predict">
                                        <i class="fas fa-crystal-ball me-2"></i>Price Predictions
                                    </a>
                                    <a class="nav-link active" href="/recommendations">
                                        <i class="fas fa-lightbulb me-2"></i>Recommendations
                                    </a>
                                    <a class="nav-link" href="/portfolio">
                                        <i class="fas fa-briefcase me-2"></i>My Portfolio
                                    </a>
                                </nav>
                                
                                <div class="mt-auto pt-4">
                                    <a class="nav-link" href="/logout">
                                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                                    </a>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Main Content -->
                        <div class="col-md-9">
                            <div class="content-area">
                                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
                                    <h2>Personalized Recommendations</h2>
                                    <div>
                                        <button class="btn btn-custom" onclick="refreshRecommendations()">
                                            <i class="fas fa-sync-alt me-2"></i>Refresh
                                        </button>
                                    </div>
                                </div>
                                
                                <!-- Loading -->
                                <div id="loadingIndicator" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p class="mt-3">Generating personalized recommendations...</p>
                                </div>
                                
                                <!-- Recommendations -->
                                <div id="recommendationsContainer" class="d-none">
                                    <!-- Recommendations will be loaded here -->
                                </div>
                                
                                <!-- No Recommendations -->
                                <div id="noRecommendations" class="recommendation-card text-center d-none">
                                    <i class="fas fa-lightbulb fa-3x text-muted mb-3"></i>
                                    <h5>Complete Your Profile</h5>
                                    <p class="text-muted">To get personalized recommendations, please complete your investment profile.</p>
                                    <a href="/profile-setup" class="btn btn-custom">
                                        <i class="fas fa-user-edit me-2"></i>Complete Profile
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadRecommendations() {
            try {
                const response = await fetch('/api/recommendations');
                const data = await response.json();
                
                document.getElementById('loadingIndicator').classList.add('d-none');
                
                if (data.success && data.recommendations.length > 0) {
                    displayRecommendations(data.recommendations);
                } else {
                    document.getElementById('noRecommendations').classList.remove('d-none');
                }
            } catch (error) {
                document.getElementById('loadingIndicator').classList.add('d-none');
                document.getElementById('noRecommendations').classList.remove('d-none');
            }
        }
        
        function displayRecommendations(recommendations) {
            const container = document.getElementById('recommendationsContainer');
            container.innerHTML = '';
            
            recommendations.forEach((rec, index) => {
                const card = createRecommendationCard(rec);
                container.appendChild(card);
            });
            
            container.classList.remove('d-none');
        }
        
        function createRecommendationCard(rec) {
            const card = document.createElement('div');
            card.className = 'recommendation-card';
            
            const riskClass = `risk-${rec.risk_level.toLowerCase()}`;
            
            card.innerHTML = `
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <div class="stock-symbol">${rec.symbol}</div>
                        <h5 class="mb-1">${rec.company_name}</h5>
                        <small class="text-muted">${rec.sector}</small>
                    </div>
                    <div class="text-end">
                        <span class="risk-badge ${riskClass}">${rec.risk_level} Risk</span>
                    </div>
                </div>
                
                <div class="price-info">
                    <div>
                        <div><strong>Current Price</strong></div>
                        <div class="h6 mb-0">${rec.price_usd_formatted}</div>
                        <small class="text-muted">${rec.price_inr_formatted}</small>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-arrow-right text-muted"></i>
                    </div>
                    <div class="text-end">
                        <div><strong>Target Price</strong></div>
                        <div class="h6 mb-0">${rec.target_price_usd_formatted}</div>
                        <small class="text-muted">${rec.target_price_inr_formatted}</small>
                    </div>
                    <div class="text-end">
                        <span class="potential-gain">+${rec.potential_gain.toFixed(1)}%</span>
                    </div>
                </div>
                
                <div class="mb-3">
                    <h6><i class="fas fa-info-circle me-2"></i>Why This Stock?</h6>
                    <p class="text-muted mb-2">${rec.reason}</p>
                    <small class="text-muted">Recent Performance: ${rec.recent_performance}</small>
                </div>
                
                <div class="row mb-3">
                    <div class="col-6">
                        <small class="text-muted">Expected Return</small>
                        <div><strong>${rec.expected_return}</strong></div>
                    </div>
                    <div class="col-6">
                        <small class="text-muted">Investment Horizon</small>
                        <div><strong>${rec.time_horizon}</strong></div>
                    </div>
                </div>
                
                <div class="alert alert-info mb-3">
                    <small>
                        <i class="fas fa-info-circle me-2"></i>
                        <strong>Suggested Investment:</strong> ₹${rec.suggested_investment.toLocaleString('en-IN')}
                        <br>
                        <em>Based on your profile and risk tolerance</em>
                    </small>
                </div>
                
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-outline-primary flex-grow-1" onclick="addToWatchlist('${rec.symbol}')">
                        <i class="fas fa-plus me-2"></i>Watchlist
                    </button>
                    <button class="btn btn-success flex-grow-1" onclick="addToPortfolio('${rec.symbol}', ${rec.current_price})">
                        <i class="fas fa-shopping-cart me-2"></i>Invest Now
                    </button>
                    <button class="btn btn-custom flex-grow-1" onclick="getPrediction('${rec.symbol}')">
                        <i class="fas fa-crystal-ball me-2"></i>Get Prediction
                    </button>
                </div>
            `;
            
            return card;
        }
        
        async function addToWatchlist(symbol) {
            try {
                const response = await fetch('/api/add-to-watchlist', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ symbol: symbol })
                });
                
                const data = await response.json();
                alert(data.message);
            } catch (error) {
                alert('Failed to add to watchlist');
            }
        }
        
        function addToPortfolio(symbol, currentPrice) {
            const shares = prompt('How many shares do you want to buy?');
            if (!shares || isNaN(shares) || shares <= 0) {
                alert('Please enter a valid number of shares');
                return;
            }
            
            const purchasePrice = prompt(`Purchase price per share (current: $${currentPrice.toFixed(2)}):`, currentPrice.toFixed(2));
            if (!purchasePrice || isNaN(purchasePrice) || purchasePrice <= 0) {
                alert('Please enter a valid purchase price');
                return;
            }
            
            fetch('/api/add-to-portfolio', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    symbol: symbol,
                    shares: parseFloat(shares),
                    purchase_price: parseFloat(purchasePrice)
                })
            })
            .then(response => response.json())
            .then(data => alert(data.message))
            .catch(error => alert('Failed to add to portfolio'));
        }
        
        function getPrediction(symbol) {
            // Navigate to prediction page with pre-filled symbol
            window.location.href = `/predict?symbol=${symbol}`;
        }
        
        function refreshRecommendations() {
            document.getElementById('recommendationsContainer').classList.add('d-none');
            document.getElementById('noRecommendations').classList.add('d-none');
            document.getElementById('loadingIndicator').classList.remove('d-none');
            
            setTimeout(() => {
                loadRecommendations();
            }, 1000); // Add slight delay for better UX
        }
        
        // Load recommendations when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadRecommendations();
        });
    </script>
</body>
</html>
