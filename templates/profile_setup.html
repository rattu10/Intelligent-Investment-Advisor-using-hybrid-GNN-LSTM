<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup - Smart Stock Investment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .setup-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            margin: 20px auto;
        }
        
        .btn-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            color: white;
        }
        
        .form-control, .form-select {
            border-radius: 15px;
            border: 2px solid #e9ecef;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            font-weight: bold;
            color: #6c757d;
        }
        
        .step.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .sector-checkbox {
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="setup-card">
                    <div class="text-center mb-4">
                        <h2 class="mb-2">Complete Your Investment Profile</h2>
                        <p class="text-muted">Help us personalize your investment recommendations</p>
                    </div>
                    
                    <!-- Step Indicator -->
                    <div class="step-indicator">
                        <div class="step active">1</div>
                        <div class="step">2</div>
                        <div class="step">3</div>
                    </div>
                    
                    <form id="profileForm">
                        <!-- Step 1: Basic Info -->
                        <div class="step-content" id="step1">
                            <h4 class="mb-4"><i class="fas fa-user me-2"></i>Basic Information</h4>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="age" class="form-label">Age</label>
                                    <input type="number" class="form-control" id="age" name="age" min="18" max="100" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="monthly_income" class="form-label">Monthly Income (₹)</label>
                                    <select class="form-select" id="monthly_income" name="monthly_income" required>
                                        <option value="">Select your income range</option>
                                        <option value="25000">₹25,000 - ₹50,000</option>
                                        <option value="50000">₹50,000 - ₹1,00,000</option>
                                        <option value="100000">₹1,00,000 - ₹2,00,000</option>
                                        <option value="200000">₹2,00,000 - ₹5,00,000</option>
                                        <option value="500000">₹5,00,000+</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="investment_experience" class="form-label">Investment Experience</label>
                                    <select class="form-select" id="investment_experience" name="investment_experience" required>
                                        <option value="">Select experience level</option>
                                        <option value="beginner">Beginner (New to investing)</option>
                                        <option value="intermediate">Intermediate (1-3 years)</option>
                                        <option value="expert">Expert (3+ years)</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="risk_tolerance" class="form-label">Risk Tolerance</label>
                                    <select class="form-select" id="risk_tolerance" name="risk_tolerance" required>
                                        <option value="">Select risk level</option>
                                        <option value="low">Low (Safe investments)</option>
                                        <option value="medium">Medium (Balanced approach)</option>
                                        <option value="high">High (Aggressive growth)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="text-center">
                                <button type="button" class="btn btn-custom" onclick="nextStep(2)">Next Step</button>
                            </div>
                        </div>
                        
                        <!-- Step 2: Investment Goals -->
                        <div class="step-content d-none" id="step2">
                            <h4 class="mb-4"><i class="fas fa-bullseye me-2"></i>Investment Goals</h4>
                            
                            <div class="mb-4">
                                <label for="investment_goals" class="form-label">What are your main investment goals?</label>
                                <textarea class="form-control" id="investment_goals" name="investment_goals" rows="4" placeholder="e.g., Save for retirement, buy a house, children's education, wealth creation..."></textarea>
                            </div>
                            
                            <div class="text-center">
                                <button type="button" class="btn btn-outline-secondary me-2" onclick="prevStep(1)">Previous</button>
                                <button type="button" class="btn btn-custom" onclick="nextStep(3)">Next Step</button>
                            </div>
                        </div>
                        
                        <!-- Step 3: Sector Preferences -->
                        <div class="step-content d-none" id="step3">
                            <h4 class="mb-4"><i class="fas fa-industry me-2"></i>Sector Preferences</h4>
                            
                            <p class="text-muted mb-4">Select the sectors you're interested in investing (optional):</p>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-check sector-checkbox">
                                        <input class="form-check-input" type="checkbox" value="technology" id="tech">
                                        <label class="form-check-label" for="tech">Technology</label>
                                    </div>
                                    <div class="form-check sector-checkbox">
                                        <input class="form-check-input" type="checkbox" value="banking" id="banking">
                                        <label class="form-check-label" for="banking">Banking & Finance</label>
                                    </div>
                                    <div class="form-check sector-checkbox">
                                        <input class="form-check-input" type="checkbox" value="healthcare" id="healthcare">
                                        <label class="form-check-label" for="healthcare">Healthcare</label>
                                    </div>
                                    <div class="form-check sector-checkbox">
                                        <input class="form-check-input" type="checkbox" value="energy" id="energy">
                                        <label class="form-check-label" for="energy">Energy</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check sector-checkbox">
                                        <input class="form-check-input" type="checkbox" value="consumer" id="consumer">
                                        <label class="form-check-label" for="consumer">Consumer Goods</label>
                                    </div>
                                    <div class="form-check sector-checkbox">
                                        <input class="form-check-input" type="checkbox" value="automotive" id="automotive">
                                        <label class="form-check-label" for="automotive">Automotive</label>
                                    </div>
                                    <div class="form-check sector-checkbox">
                                        <input class="form-check-input" type="checkbox" value="pharma" id="pharma">
                                        <label class="form-check-label" for="pharma">Pharmaceuticals</label>
                                    </div>
                                    <div class="form-check sector-checkbox">
                                        <input class="form-check-input" type="checkbox" value="real_estate" id="real_estate">
                                        <label class="form-check-label" for="real_estate">Real Estate</label>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="text-center mt-4">
                                <button type="button" class="btn btn-outline-secondary me-2" onclick="prevStep(2)">Previous</button>
                                <button type="submit" class="btn btn-custom">
                                    <i class="fas fa-check me-2"></i>Complete Setup
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentStep = 1;
        
        function nextStep(step) {
            // Hide current step
            document.getElementById(`step${currentStep}`).classList.add('d-none');
            
            // Show next step
            document.getElementById(`step${step}`).classList.remove('d-none');
            
            // Update step indicator
            document.querySelectorAll('.step')[currentStep - 1].classList.remove('active');
            document.querySelectorAll('.step')[step - 1].classList.add('active');
            
            currentStep = step;
        }
        
        function prevStep(step) {
            // Hide current step
            document.getElementById(`step${currentStep}`).classList.add('d-none');
            
            // Show previous step
            document.getElementById(`step${step}`).classList.remove('d-none');
            
            // Update step indicator
            document.querySelectorAll('.step')[currentStep - 1].classList.remove('active');
            document.querySelectorAll('.step')[step - 1].classList.add('active');
            
            currentStep = step;
        }
        
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // Get selected sectors
            const sectors = [];
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(checkbox => {
                sectors.push(checkbox.value);
            });
            data.preferred_sectors = sectors;
            
            try {
                const response = await fetch('/api/profile', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Profile setup complete! Welcome to Smart Stock Investment.');
                    window.location.href = '/dashboard';
                } else {
                    alert(result.message || 'Profile setup failed');
                }
            } catch (error) {
                alert('Profile setup failed. Please try again.');
            }
        });
    </script>
</body>
</html>
